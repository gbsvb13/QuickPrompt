<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Quick - Research Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        textarea { line-height: 1.6; }
        .cat-btn { transition: all 0.2s ease; }
        .hidden { display: none; }
        .guide-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-2xl bg-white rounded-3xl shadow-2xl p-10">
        <h1 class="text-4xl font-extrabold text-gray-900 mb-8 text-center tracking-tight">
            <span class="text-blue-600 text-5xl">🚀</span><br>Quick Prompt
        </h1>
        
        <div id="category-container" class="flex flex-wrap gap-2 mb-6 justify-center">
            <button onclick="setCategory('시사/이슈')" class="cat-btn px-4 py-2 rounded-full border-2 border-blue-500 bg-blue-500 text-white font-bold text-xs sm:text-sm">시사/이슈</button>
            <button onclick="setCategory('코딩')" class="cat-btn px-4 py-2 rounded-full border-2 border-gray-100 text-gray-600 hover:border-blue-500 font-bold text-xs sm:text-sm">코딩</button>
            <button onclick="setCategory('학술/과제')" class="cat-btn px-4 py-2 rounded-full border-2 border-gray-100 text-gray-600 hover:border-blue-500 font-bold text-xs sm:text-sm">학술/과제</button>
            <button onclick="setCategory('상담')" class="cat-btn px-4 py-2 rounded-full border-2 border-gray-100 text-gray-600 hover:border-blue-500 font-bold text-xs sm:text-sm">개인 상담</button>
            <button onclick="setCategory('글쓰기/교정')" class="cat-btn px-4 py-2 rounded-full border-2 border-gray-100 text-gray-600 hover:border-blue-500 font-bold text-xs sm:text-sm">글쓰기/교정</button>
        </div>

        <div class="bg-gray-50 rounded-2xl p-6 mb-8 space-y-4 shadow-inner text-sm">
            <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
                <span class="font-bold text-gray-500">분석 모드</span>
                <div id="mode-selector" class="flex gap-2">
                    <label class="cursor-pointer"><input type="radio" name="mode" value="비전문가" checked onclick="setMode('비전문가')" class="hidden peer"><div class="px-3 py-1.5 rounded-lg border border-gray-200 text-xs peer-checked:bg-green-50 peer-checked:border-green-500 peer-checked:text-green-700 font-semibold">🌿 비전문가</div></label>
                    <label class="cursor-pointer"><input type="radio" name="mode" value="전문가" onclick="setMode('전문가')" class="hidden peer"><div class="px-3 py-1.5 rounded-lg border border-gray-200 text-xs peer-checked:bg-blue-50 peer-checked:border-blue-500 peer-checked:text-blue-700 font-semibold">💎 전문가</div></label>
                    <label id="paper-mode-label" class="hidden cursor-pointer"><input type="radio" name="mode" value="논문분석" onclick="setMode('논문분석')" class="hidden peer"><div class="px-3 py-1.5 rounded-lg border border-gray-200 text-xs peer-checked:bg-purple-50 peer-checked:border-purple-500 peer-checked:text-purple-700 font-semibold text-gray-400">🔍 논문분석</div></label>
                </div>
            </div>

            <div id="special-option-row" class="hidden border-t border-gray-200 pt-4">
                <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
                    <span id="slider-title" class="font-bold text-gray-500 text-xs sm:text-sm">성향 설정</span>
                    <div class="flex items-center gap-3">
                        <span id="slider-left-text" class="text-[11px] font-bold text-pink-500">왼쪽</span>
                        <label class="inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="empathy-setting" class="sr-only peer">
                            <div class="relative w-10 h-5 bg-pink-400 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-400"></div>
                        </label>
                        <span id="slider-right-text" class="text-[11px] font-bold text-blue-500">오른쪽</span>
                    </div>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row items-center justify-between gap-4 border-t border-gray-200 pt-4">
                <span class="font-bold text-gray-500">답변 길이</span>
                <select id="length-opt" class="text-xs border border-gray-200 rounded-lg px-3 py-1.5 outline-none bg-white">
                    <option value="" selected>보통 (기본값)</option>
                    <option value="핵심 위주로 짧게">아주 짧게</option>
                    <option value="심층적인 리포트 형식으로">아주 길게</option>
                </select>
            </div>
        </div>

        <div class="space-y-6">
            <input type="text" id="topic" placeholder="주제 또는 내용을 입력하세요" 
                   class="w-full px-6 py-4 text-lg rounded-2xl border-2 border-gray-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all">
            <div id="template-area" class="flex flex-wrap gap-2 py-1"></div>
            <button onclick="generate()" class="w-full bg-blue-600 text-white py-5 rounded-2xl text-xl font-black hover:bg-blue-700 active:scale-[0.98] transition-all shadow-xl">
                프롬프트 생성 및 복사
            </button>
        </div>

        <div id="result-area" class="mt-10 hidden border-t-2 border-gray-50 pt-8">
            <div class="flex justify-between items-center mb-4">
                <span id="copy-status" class="text-sm text-blue-600 font-bold opacity-0 transition-opacity font-mono tracking-tighter uppercase">SUCCESS: PROMPT_COPIED</span>
            </div>
            <textarea id="result-text" class="w-full p-6 bg-gray-50 rounded-2xl text-base text-gray-800 border-2 border-gray-100 outline-none focus:border-blue-300 min-h-[250px] resize-y" spellcheck="false"></textarea>
            <button onclick="copyEditedPrompt()" class="w-full mt-4 bg-gray-900 text-white py-4 rounded-xl text-md font-bold hover:bg-black transition-all shadow-lg">내용 수정 후 다시 복사</button>
        </div>
    </div>

    <script>
        const templates = {
            '시사/이슈': ['인구 절벽 대응', '탄소 국경세', 'AI 윤리 규제'],
            '코딩': ['JWT 보안 인증', 'SQL 인젝션 방어', 'React 성능 최적화'],
            '학술/과제': ['딥러닝과 트랜스포머', '양자역학의 국소성', '행동 경제학 사례'],
            '상담': ['요즘 너무 힘든 일이 있어', '진로 고민 때문에 머리가 복잡해', '인간관계가 내 마음같지 않아'],
            '글쓰기/교정': ['교수님 면담 요청 메일', '보고서 서론 논리 보완', '부재 중 메일 자동 응답문','업무 미팅 제안 및 일정 조율']
        };

        let currentCategory = '시사/이슈';
        let currentMode = '비전문가';

        window.onload = () => setCategory('시사/이슈');

        function setCategory(cat) {
            currentCategory = cat;
            const paperLabel = document.getElementById('paper-mode-label');
            const specialRow = document.getElementById('special-option-row');
            const sliderTitle = document.getElementById('slider-title');
            const sliderLeft = document.getElementById('slider-left-text');
            const sliderRight = document.getElementById('slider-right-text');
            const topicInput = document.getElementById('topic');

            paperLabel.classList.add('hidden');
            specialRow.classList.add('hidden');

            if (cat === '학술/과제') {
                paperLabel.classList.remove('hidden');
                topicInput.placeholder = "주제, 논문 초록 또는 구글 스칼라 링크를 입력하세요";
            } else if (cat === '상담') {
                specialRow.classList.remove('hidden');
                sliderTitle.innerText = "상담 성향";
                sliderLeft.innerText = "공감과 위로";
                sliderRight.innerText = "분석과 해결책";
                topicInput.placeholder = "고민 내용을 입력하세요";
            } else if (cat === '글쓰기/교정') {
                specialRow.classList.remove('hidden');
                sliderTitle.innerText = "교정 문체";
                sliderLeft.innerText = "부드럽고 정중하게";
                sliderRight.innerText = "간결하고 논리적으로";
                topicInput.placeholder = "다듬고 싶은 초안이나 핵심 내용을 입력하세요";
            } else {
                topicInput.placeholder = "주제를 입력하세요";
            }

            document.querySelectorAll('.cat-btn').forEach(btn => {
                const isSelected = btn.innerText === cat;
                btn.className = `cat-btn px-4 py-2 rounded-full border-2 font-bold text-xs sm:text-sm ${isSelected ? 'border-blue-500 bg-blue-500 text-white' : 'border-gray-100 text-gray-600 hover:border-blue-500'}`;
            });
            renderTemplates();
        }

        function setMode(mode) {
            currentMode = mode;
            renderTemplates();
        }

        function renderTemplates() {
            const container = document.getElementById('template-area');
            container.innerHTML = ''; 
            if (currentCategory === '학술/과제' && currentMode === '논문분석') {
                const guide = document.createElement('p');
                guide.className = "w-full text-blue-600 text-[10px] font-bold mb-1 guide-pulse";
                guide.innerText = "🔍 논문 분석 모드에서는 링크 입력이 권장됩니다.";
                container.appendChild(guide);
            }
            templates[currentCategory].forEach(text => {
                const tag = document.createElement('button');
                tag.className = "text-[10px] bg-white border border-gray-200 text-gray-400 px-2 py-1 rounded-md hover:text-blue-500 transition-all font-medium";
                tag.innerText = `# ${text}`;
                tag.onclick = () => { document.getElementById('topic').value = text; generate(); };
                container.appendChild(tag);
            });
            if (currentCategory === '학술/과제' && currentMode === '논문분석') {
                const alert = document.createElement('p');
                alert.className = "w-full text-gray-400 text-[10px] mt-1 ml-1 italic";
                alert.innerText = "(단, 유료 논문이나 접근 제한이 걸린 건 초록 내용 추가 권장)";
                container.appendChild(alert);
            }
        }

        function generate() {
            const topic = document.getElementById('topic').value.trim();
            const lengthVal = document.getElementById('length-opt').value;
            const isRightSide = document.getElementById('empathy-setting').checked;
            if(!topic) return;

            let prompt = "";
            const commonTail = "\n\n[출력 가이드] 소제목과 불렛포인트를 활용해 시각적으로 깔끔하게 작성해 주세요.";

            if (currentMode === '논문분석') {
                prompt = `당신은 연구 심사위원입니다. [ ${topic} ]을(를) 분석하여 연구의 필요성, 핵심 발견, 학술적 가치를 요약하고 관련 구글 스칼라 검색어 링크를 생성하세요.`;
            } else if (currentMode === '전문가') {
                if (currentCategory === '글쓰기/교정') {
                    const style = isRightSide ? "간결하고 논리적인 보고서/기획안 스타일" : "예의와 격식을 갖춘 공식 비즈니스 스타일";
                    prompt = `당신은 전문 에디터입니다. 입력된 내용 [ ${topic} ]을 바탕으로 **완성된 최종 초고**를 작성해 주세요.
1. **[최종 초고]** ${style}에 맞춰 즉시 사용 가능한 완성된 텍스트를 제공하세요.
2. **[교정 핵심]** 논리 구조, 어휘 선택, 문법적 오류 중 어떤 부분을 중점적으로 개선했는지 설명하세요.
3. **[대안 제시]** 상황에 따라 선택할 수 있는 다른 표현 한 가지를 더 추천하세요.`;
                } else if (currentCategory === '상담') {
                    const inst = isRightSide ? "정서적 공감은 생략하고 차가운 해결책에 집중하세요." : "먼저 깊이 공감하고 위로한 뒤 조언하세요.";
                    prompt = `당신은 심리학 박사입니다. [ ${topic} ]에 대해 조언하세요:\n${inst}\n1. 근본 원인 분석\n2. 실행 가능한 해결책`;
                } else {
                    prompt = `당신은 해당 분야의 시니어 전문가입니다. [ ${topic} ]에 대해 심도 있는 분석 리포트를 작성하세요.`;
                }
            } else {
                if (currentCategory === '글쓰기/교정') {
                    const style = isRightSide ? "핵심만 명확한 담백한 말투" : "친절하고 부드러운 말투";
                    prompt = `당신은 글쓰기 멘토입니다. [ ${topic} ] 내용을 바탕으로 **바로 보낼 수 있는 메시지 초고**를 작성해 주세요.
1. **[다듬어진 초고]** ${style}를 살려 완성된 글을 먼저 보여주세요.
2. **[작성 팁]** 왜 이렇게 쓰는 것이 읽는 사람에게 더 좋은 인상을 주는지 쉬운 이유를 덧붙여 주세요.`;
                } else {
                    prompt = `당신은 [${currentCategory}] 분야의 친절한 가이드입니다. [ ${topic} ]을(를) 중학생도 이해할 수 있게 비유를 들어 설명해 주세요.`;
                }
            }

            if(lengthVal) prompt += `\n\n[분량] ${lengthVal}`;
            prompt += commonTail;

            document.getElementById('result-text').value = prompt;
            document.getElementById('result-area').classList.remove('hidden');
            navigator.clipboard.writeText(prompt);
            const status = document.getElementById('copy-status');
            status.style.opacity = '1';
            setTimeout(() => status.style.opacity = '0', 2000);
        }

        function copyEditedPrompt() {
            navigator.clipboard.writeText(document.getElementById('result-text').value);
        }
    </script>
</body>
</html>
