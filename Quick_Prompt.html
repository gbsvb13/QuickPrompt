<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Quick - Custom Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        textarea { line-height: 1.6; }
        .cat-btn { transition: all 0.2s ease; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-2xl bg-white rounded-3xl shadow-2xl p-10">
        <h1 class="text-4xl font-extrabold text-gray-900 mb-8 text-center tracking-tight">
            <span class="text-blue-600 text-5xl">🚀</span><br>Prompt Quick
        </h1>
        
        <div id="category-container" class="flex flex-wrap gap-3 mb-6 justify-center">
            <button onclick="setCategory('시사/이슈')" class="cat-btn px-5 py-2.5 rounded-full border-2 border-blue-500 bg-blue-500 text-white font-bold text-sm">시사/이슈</button>
            <button onclick="setCategory('코딩')" class="cat-btn px-5 py-2.5 rounded-full border-2 border-gray-100 text-gray-600 hover:border-blue-500 font-bold text-sm">코딩</button>
            <button onclick="setCategory('학술/과제')" class="cat-btn px-5 py-2.5 rounded-full border-2 border-gray-100 text-gray-600 hover:border-blue-500 font-bold text-sm">학술/과제</button>
            <button onclick="setCategory('상담')" class="cat-btn px-5 py-2.5 rounded-full border-2 border-gray-100 text-gray-600 hover:border-blue-500 font-bold text-sm">개인 상담</button>
        </div>

        <div class="bg-gray-50 rounded-2xl p-6 mb-8 space-y-4 shadow-inner">
            <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
                <span class="text-sm font-bold text-gray-500">지식 수준</span>
                <div class="flex gap-2">
                    <label class="cursor-pointer"><input type="radio" name="mode" value="비전문가" checked onclick="currentMode='비전문가'" class="hidden peer"><div class="px-4 py-1.5 rounded-lg border border-gray-200 text-xs peer-checked:bg-green-50 peer-checked:border-green-500 peer-checked:text-green-700 font-semibold">🌿 쉽게</div></label>
                    <label class="cursor-pointer"><input type="radio" name="mode" value="전문가" onclick="currentMode='전문가'" class="hidden peer"><div class="px-4 py-1.5 rounded-lg border border-gray-200 text-xs peer-checked:bg-blue-50 peer-checked:border-blue-500 peer-checked:text-blue-700 font-semibold">💎 깊게</div></label>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
                <span class="text-sm font-bold text-gray-500">답변 길이</span>
                <select id="length-opt" class="text-xs border border-gray-200 rounded-lg px-3 py-1.5 outline-none focus:ring-2 focus:ring-blue-300 bg-white">
                    <option value="한 줄로 핵심만 요약해서">아주 짧게</option>
                    <option value="" selected>보통 (기본값)</option>
                    <option value="매우 길고 심층적인 리포트 형식으로">아주 길게</option>
                </select>
            </div>

            <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
                <span class="text-sm font-bold text-gray-500">답변 어조</span>
                <select id="tone-opt" class="text-xs border border-gray-200 rounded-lg px-3 py-1.5 outline-none focus:ring-2 focus:ring-blue-300 bg-white">
                    <option value="" selected>기본 (설정 안 함)</option>
                    <option value="친절하고 부드러운 말투로">친절하게</option>
                    <option value="단호하고 분석적인 말투로">단호하고 이성적으로</option>
                    <option value="정중하고 격식 있는 비즈니스 말투로">정중하게</option>
                    <option value="유머러스하고 재치 있게">재치 있게</option>
                </select>
            </div>
        </div>

        <div class="space-y-6">
            <input type="text" id="topic" placeholder="주제를 입력하세요" 
                   class="w-full px-6 py-4 text-lg rounded-2xl border-2 border-gray-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all">
            
            <div id="template-area" class="flex flex-wrap gap-2 py-1"></div>
            
            <button onclick="generate()" class="w-full bg-blue-600 text-white py-5 rounded-2xl text-xl font-black hover:bg-blue-700 active:scale-[0.98] transition-all shadow-xl">
                프롬프트 생성 및 복사
            </button>
        </div>

        <div id="result-area" class="mt-10 hidden border-t-2 border-gray-50 pt-8">
            <div class="flex justify-between items-center mb-4">
                <span id="copy-status" class="text-sm text-blue-600 font-bold opacity-0 transition-opacity font-mono">SYSTEM: PROMPT_COPIED</span>
            </div>
            <textarea id="result-text" 
                      class="w-full p-6 bg-gray-50 rounded-2xl text-base text-gray-800 border-2 border-gray-100 outline-none focus:border-blue-300 min-h-[250px] resize-y"
                      spellcheck="false"></textarea>
            
            <button onclick="copyEditedPrompt()" class="w-full mt-4 bg-gray-900 text-white py-4 rounded-xl text-md font-bold hover:bg-black transition-all">
                내용 수정 후 다시 복사
            </button>
        </div>
    </div>

    <script>
        const templates = {
            '시사/이슈': ['인구 절벽 대응', '탄소 국경세', 'AI 윤리 규제'],
            '코딩': ['JWT 보안 인증', 'SQL 인젝션 방어', 'React 성능 최적화'],
            '학술/과제': ['딥러닝과 트랜스포머', '양자역학의 국소성', '행동 경제학 사례'],
            '상담': ['번아웃 극복', '자취생 건강 관리', '시간 관리 전략']
        };

        let currentCategory = '시사/이슈';
        let currentMode = '비전문가';

        window.onload = () => renderTemplates();

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                const isSelected = btn.innerText === cat;
                btn.className = `cat-btn px-5 py-2.5 rounded-full border-2 font-bold text-sm ${isSelected ? 'border-blue-500 bg-blue-500 text-white' : 'border-gray-100 text-gray-600 hover:border-blue-500'}`;
            });
            renderTemplates();
        }

        function renderTemplates() {
            const container = document.getElementById('template-area');
            container.innerHTML = ''; 
            templates[currentCategory].forEach(text => {
                const tag = document.createElement('button');
                tag.className = "text-xs bg-white border border-gray-200 text-gray-400 px-3 py-1.5 rounded-lg hover:text-blue-500 transition-all font-medium";
                tag.innerText = `# ${text}`;
                tag.onclick = () => { document.getElementById('topic').value = text; generate(); };
                container.appendChild(tag);
            });
        }

        function generate() {
            const topic = document.getElementById('topic').value;
            const lengthVal = document.getElementById('length-opt').value;
            const toneVal = document.getElementById('tone-opt').value;
            if(!topic) return;

            let prompt = "";
            
            if (currentMode === '전문가') {
                const commonTail = "\n\n답변은 논리적인 근거를 바탕으로 단계별(Step-by-step)로 작성해 주세요. 전문적인 용어를 사용하되 가독성을 위해 소제목과 불렛포인트를 활용해 주세요.";
                if(currentCategory === '시사/이슈') {
                    prompt = `당신은 세계적인 정책 연구소의 수석 분석가입니다. 주제인 [${topic}]에 대해 다음 구조로 심층 분석하세요:\n1. 이슈의 역사적 배경과 현재 당면한 과제\n2. 주요 이해관계자들의 입장 분석\n3. 향후 발생 가능한 시나리오 3가지\n4. 해결을 위한 정책적 제언${commonTail}`;
                } else if(currentCategory === '코딩') {
                    prompt = `당신은 15년 차 시니어 소프트웨어 아키텍트입니다. [${topic}] 구현 시 다음 사항을 포함해 주세요:\n1. 최적의 설계 패턴 제안\n2. 클린 코드 원칙 및 성능 최적화 가이드\n3. 보안 취약점 대책\n4. 모범 사례 코드 예시${commonTail}`;
                } else if(currentCategory === '학술/과제') {
                    // 학술 전문가 모드 강화: 구글 스칼라 검색 키워드 유도 추가
                    prompt = `당신은 해당 분야의 권위 있는 학술지 편집장입니다. [${topic}]에 대해 대학원 세미나 수준의 깊이로 설명해 주세요:\n1. 개념의 학술적 정의 및 패러다임의 변화\n2. 핵심 이론 및 관련 학자들의 논쟁점\n3. 현대 사회에서의 실질적 가치\n4. **[출처 확보] 해당 주제에 대해 최신 논문을 찾을 수 있도록 'Google Scholar' 검색용 영어 키워드 3개와 각각의 검색 결과 링크를 직접 생성하여 제공하세요.**\n5. 추가 연구 방향 제시${commonTail}`;
                } else {
                    prompt = `당신은 전문 상담가입니다. [${topic}] 문제에 대해 조언해 주세요:\n1. 심리적 상태 해석\n2. 근본적인 원인 분석\n3. 행동 교정 전략 3단계\n4. 회복 탄력성 강화 방안${commonTail}`;
                }
            } else {
                const commonTail = "\n\n[답변 규칙]\n1. 어려운 용어는 피하고 쉬운 설명을 덧붙여 주세요.\n2. 일상생활의 예시나 비유를 들어 설명해 주세요.\n3. 소제목과 불렛포인트를 활용해 주세요.";
                if(currentCategory === '시사/이슈') {
                    prompt = `당신은 친절한 시사 유튜버입니다. 주제인 [${topic}]에 대해 다음 순서로 알려주세요:\n1. 사건의 발단\n2. 찬반 입장 차이\n3. 우리 일상의 변화${commonTail}`;
                } else if(currentCategory === '코딩') {
                    prompt = `당신은 친절한 선배 개발자입니다. [${topic}]에 대해 다음 내용을 포함해 주세요:\n1. 기술 필요성 설명\n2. 단순한 코드 예시\n3. 주의해야 할 팁${commonTail}`;
                } else if(currentCategory === '학술/과제') {
                    // 학술 비전문가 모드 강화: 쉬운 검색어 유도
                    prompt = `당신은 개념을 쉽게 설명하는 일타 강사입니다. [${topic}]에 대해 다음 구조로 알려주세요:\n1. 핵심 요약\n2. 쉬운 배경 설명\n3. 실제 적용 사례\n4. **[더 알아보기] 이 주제를 더 깊게 공부하고 싶을 때 Google Scholar에서 검색해볼 만한 쉬운 영어 검색어와 링크를 알려주세요.**${commonTail}`;
                } else {
                    prompt = `당신은 현명한 동네 형/누나입니다. [${topic}] 문제에 대해 조언해 주세요:\n1. 따뜻한 공감\n2. 실천할 작은 행동 3가지\n3. 긍정적인 메시지${commonTail}`;
                }
            }

            let extras = [];
            if(lengthVal) extras.push(`분량: ${lengthVal}`);
            if(toneVal) extras.push(`어조: ${toneVal}`);
            
            if(extras.length > 0) {
                prompt += `\n\n[추가 요구사항]\n- ${extras.join('\n- ')}`;
            }

            const resultText = document.getElementById('result-text');
            resultText.value = prompt;
            document.getElementById('result-area').classList.remove('hidden');
            copyText(prompt);
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                const status = document.getElementById('copy-status');
                status.style.opacity = '1';
                setTimeout(() => status.style.opacity = '0', 2000);
            });
        }

        function copyEditedPrompt() {
            copyText(document.getElementById('result-text').value);
        }
    </script>
</body>
</html>
